name: Codex Tagged Review

on:
  workflow_run:
    workflows:
      - Verify
    types:
      - completed

jobs:
  request_review:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Request Codex review on the PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run = context.payload.workflow_run;
            const prRef = run.pull_requests?.[0];

            if (!prRef) {
              core.notice("연결된 PR 이 없어 Codex 리뷰 요청을 건너뜁니다.");
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prRef.number,
            });

            if (pr.data.state !== "open" || pr.data.draft) {
              core.notice("열린 리뷰 대상 PR 이 아니어서 Codex 리뷰 요청을 건너뜁니다.");
              return;
            }

            const marker = `<!-- codex-auto-review:${run.head_sha} -->`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              per_page: 100,
            });

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.notice("같은 head SHA 에 대한 Codex 자동 리뷰 요청 코멘트가 이미 있습니다.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              body: [
                marker,
                "@codex 이 PR의 최신 변경만 리뷰해주세요.",
                "",
                "- findings 를 먼저, 심각도 높은 순서로 정리하세요.",
                "- 버그, 회귀, 위험한 가정, 누락된 검증을 우선하세요.",
                "- 근거가 있으면 파일 경로와 라인 번호를 적으세요.",
                "- 명시적 문제가 없으면 그 사실과 남은 리스크만 짧게 적으세요.",
                "- 리뷰 본문은 한국어로 작성하세요.",
              ].join("\n"),
            });
