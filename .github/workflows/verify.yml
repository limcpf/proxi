name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Enable Corepack
        run: corepack enable

      - name: Show pnpm version
        run: pnpm --version

      - name: Run verify
        run: pnpm run verify
