services:
  postgres:
    image: postgres:18.3
    container_name: proxi-postgres
    environment:
      POSTGRES_USER: proxi
      POSTGRES_PASSWORD: proxi
      POSTGRES_DB: proxi
    ports:
      - "5432:5432"
    volumes:
      - proxi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxi -d proxi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  proxi-postgres-data:

